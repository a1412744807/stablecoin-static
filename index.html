<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>稳定币理财看板</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .navbar {
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .navbar-right {
            display: flex;
            gap: 12px;
        }

        .social-btn .btn-text-short {
            display: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .header-left h1 {
            font-size: 1.8rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .header-left .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 8px;
        }
        
        .header-right {
            display: flex;
            gap: 12px;
        }
        
        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .twitter-btn {
            background: #fff;
            color: #1da1f2;
            border: 1px solid #1da1f2;
        }
        
        .twitter-btn:hover {
            background: #1da1f2;
            color: #fff;
        }
        
        .telegram-btn {
            background: #fff;
            color: #0088cc;
            border: 1px solid #0088cc;
        }

        .telegram-btn:hover {
            background: #0088cc;
            color: #fff;
        }

        /* 刷新按钮 */
        .refresh-btn {
            background: transparent;
            border: none;
            padding: 8px;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            flex-shrink: 0;
            width: 32px;
            height: 32px;
        }

        .refresh-btn:hover {
            color: #1890ff;
        }

        .refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        /* 主表格卡片 */
        .table-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-top: 16px;
        }
        
        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }
        
        .data-table th {
            background: #fafafa;
            color: #888;
            font-weight: normal;
            padding: 14px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .data-table th.sortable {
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .data-table th.sortable:hover {
            background: #f0f0f0;
        }

        .sort-icon {
            display: inline-block;
            margin-left: 4px;
            font-size: 12px;
            color: #d4a017;
        }
        
        .data-table td {
            color: #333;
            padding: 20px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
            text-align: center;
        }
        
        .data-table tr:hover td {
            background: #f5f5f5;
        }
        
        .data-table tr:last-child td {
            border-bottom: none;
        }
        
        /* 币种单元格 */
        .coin-cell {
            text-align: left !important;
            font-weight: 600;
            color: #222;
        }
        
        .sub-text {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
            font-weight: normal;
        }
        
        /* APY 高亮 */
        .highlight {
            color: #d4a017;
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
        }
        
        /* 剩余时间 */
        .remaining-time {
            font-size: 13px;
            color: #d4a017;
            margin-top: 4px;
            border: none;
            outline: none;
        }

        /* APY备注（括号内文字） */
        .apy-note {
            font-size: 10px;
            color: rgba(212, 160, 23, 0.55);
            font-weight: normal;
            margin-left: 2px;
        }

        /* 进度条 */
        .progress-bar {
            width: 80px;
            max-width: 100%;
            height: 3px;
            background: #eee;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
            border: none;
            outline: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd666, #d4a017);
            border-radius: 2px;
        }
        
        /* APY单元格容器 */
        .apy-cell {
            display: inline-block;
            text-align: center;
        }
        
        /* 标签 */
        .tag {
            display: inline-block;
            background: #f0f0f0;
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 12px;
            color: #666;
            margin: 2px;
        }
        
        .tag-limit {
            background: #fff1f0;
            color: #cf1322;
        }
        
        .tag-lock {
            background: #e6f7ff;
            color: #1890ff;
        }
        
        .tag-pay {
            background: #f6ffed;
            color: #52c41a;
        }
        
        /* 操作按钮 */
        .action-cell {
            text-align: center !important;
            white-space: nowrap;
        }
        
        .calc-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            color: #9aa3af;
            border: 1px solid #e2e6ec;
            border-radius: 8px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            margin-right: 8px;
            transition: all 0.2s;
            vertical-align: middle;
        }
        
        .calc-btn:hover {
            background: #eceff3;
            border-color: #d8dde5;
            color: #848e9b;
        }
        
        .go-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1890ff;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            padding: 0 14px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid #1890ff;
            font-weight: 500;
            transition: all 0.2s;
            vertical-align: middle;
            white-space: nowrap;
            line-height: 1;
        }
        
        .go-btn:hover {
            background: #3ea5ff;
            border-color: #3ea5ff;
        }
        
        /* 加载状态 */
        .loading-container {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #eee;
            border-top-color: #1890ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard-wrapper {
            position: relative;
        }

        .refresh-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 14px;
            color: #666;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 100;
        }

        .refresh-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .refresh-overlay .loading-spinner {
            width: 32px;
            height: 32px;
            margin-bottom: 0;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            animation: modalIn 0.2s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-close {
            cursor: pointer;
            font-size: 24px;
            color: #999;
            line-height: 1;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .modal-info-row {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
        }
        
        .modal-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .modal-info-item:last-child {
            margin-bottom: 0;
        }
        
        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #1890ff;
        }
        
        .modal-result {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .modal-result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .modal-result-item:last-child {
            margin-bottom: 0;
        }
        
        .modal-result-value {
            font-weight: 600;
            color: #52c41a;
            font-size: 16px;
        }
        
        .modal-note {
            font-size: 12px;
            color: #999;
            text-align: center;
        }
        
        /* 手机端标签（PC端隐藏） */
        .mobile-tags {
            display: none;
            margin-top: 6px;
        }

        /* 移动端操作按钮（PC端隐藏） */
        .mobile-actions {
            display: none;
            margin-top: 24px;
            justify-content: flex-end;
            gap: 8px;
        }

        /* 深色模式 */
        body.dark {
            background: #1a1a2e;
        }

        body.dark .table-card,
        body.dark .modal-box {
            background: #16213e;
        }

        body.dark .data-table th {
            background: #1a1a2e;
            color: #888;
        }

        body.dark .data-table td {
            color: #e0e0e0;
            border-bottom-color: #2a2a4a;
        }

        body.dark .data-table tr:hover td {
            background: #1a1a2e;
        }

        body.dark .header-left h1,
        body.dark .coin-cell {
            color: #e0e0e0;
        }

        body.dark .sub-text {
            color: #888;
        }

        body.dark .social-btn {
            background: #16213e;
            border-color: #2a2a4a;
        }

        body.dark .navbar {
            background: #16213e;
            border-bottom-color: #2a2a4a;
        }

        body.dark .navbar-left {
            color: #e0e0e0;
        }

        body.dark .refresh-overlay {
            background: rgba(22, 33, 62, 0.9);
            color: #cdd2ff;
        }

        body.dark .calc-btn {
            background: #2a2f3a;
            color: #aab2bf;
            border-color: #3a4250;
        }

        body.dark .go-btn {
            background: #3f95ee;
            color: #fff;
            border-color: #3f95ee;
        }

        body.dark .mobile-actions .go-btn {
            background: #3f95ee;
            color: #ffffff;
            border-color: #3f95ee;
        }

        body.dark .mobile-actions .calc-btn {
            background: #2a2f3a;
            color: #aab2bf;
            border: 1px solid #3a4250;
        }

        /* ===== 移动端适配 ===== */
        @media screen and (max-width: 768px) {
            /* 导航栏：增加下边距，与下方内容分离 */
            .navbar {
                margin-bottom: 8px;
            }

            .navbar-inner {
                padding: 14px 12px;
            }

            /* 标题更大 */
            .navbar-left {
                font-size: 1.15rem;
            }

            .navbar-right {
                gap: 6px;
                align-items: center;
            }

            .social-btn .btn-text-full {
                display: none;
            }

            .social-btn .btn-text-short {
                display: inline;
            }

            .container {
                padding: 12px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-left h1 {
                font-size: 1.4rem;
            }

            .header-right {
                width: 100%;
                gap: 8px;
            }

            .social-btn {
                flex: 0 0 auto;
                justify-content: center;
                padding: 6px 10px;
                font-size: 0.7rem;
                white-space: nowrap;
                gap: 3px;
                height: auto;
                align-self: center;
            }

            .refresh-btn {
                flex: none;
                width: 32px;
                height: 32px;
            }

            .data-table {
                font-size: 14px;
            }

            /* 表头行：增加上下间距 */
            .data-table th {
                padding: 18px 10px;
                font-size: 13px;
            }

            .data-table td {
                padding: 12px 8px;
            }

            /* 调整列宽：币种宽，年化窄 */
            .data-table th:first-child,
            .data-table td:first-child {
                width: 55%;
            }

            .data-table th:nth-child(2),
            .data-table td:nth-child(2) {
                width: 45%;
            }

            /* 隐藏PC端列 */
            .pc-only {
                display: none;
            }

            /* 显示移动端标签 */
            .mobile-tags {
                display: block;
            }

            .mobile-tags .tag {
                font-size: 10px;
                padding: 2px 6px;
            }

            /* 移动端隐藏第三列，显示移动端操作按钮 */
            .action-cell {
                display: none;
            }

            .mobile-actions {
                display: flex;
                margin-top: 20px;
                padding-bottom: 12px;
                justify-content: flex-end;
                gap: 8px;
            }

            .mobile-actions .calc-btn {
                width: 28px;
                height: 28px;
                margin-right: 0;
                border-radius: 8px;
            }

            .mobile-actions .calc-btn svg {
                width: 13px;
                height: 13px;
            }

            .mobile-actions .go-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                height: 28px;
                padding: 0 11px;
                font-size: 11px;
                background: #1890ff;
                color: #fff;
                border: 1px solid #1890ff;
                font-weight: 500;
                border-radius: 8px;
                line-height: 1;
            }

            .mobile-actions .go-btn:hover {
                background: #3ea5ff;
                border-color: #3ea5ff;
                color: #fff;
            }

            .highlight {
                font-size: 14px;
            }

            /* 剩余时间字号缩小，保持一行 */
            .remaining-time {
                font-size: 11px;
            }

            .modal-box {
                width: 90%;
                max-width: 320px;
                padding: 20px;
            }
        }
        
        @media screen and (max-width: 480px) {
            .coin-cell {
                font-size: 13px;
            }
            
            .sub-text {
                font-size: 11px;
            }
            
            .action-inner {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 4px;
            }

            .calc-btn {
                margin-right: 0;
            }

        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="navbar-left">
                <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;" style="text-decoration:none;color:inherit;">💰 稳定币理财看板</a>
            </div>
            <div class="navbar-right">
                <a href="https://x.com/Web3Daoge1" target="_blank" class="social-btn twitter-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    <span class="btn-text-full">关注刀哥推特</span><span class="btn-text-short">推特</span>
                </a>
                <a href="https://t.me/+3sdC7fJzDCxlZjY1" target="_blank" class="social-btn telegram-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                    <span class="btn-text-full">加入刀哥社群</span><span class="btn-text-short">社群</span>
                </a>
                <button class="refresh-btn" onclick="refreshData()" title="刷新数据">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="loading" class="loading-container">
            <div class="loading-spinner"></div>
            <p>正在加载数据...</p>
        </div>
        
        <div id="dashboard" style="display: none;">
            <!-- 数据表格 -->
            <div class="dashboard-wrapper">
                <div id="refresh-overlay" class="refresh-overlay">
                    <div class="loading-spinner"></div>
                    <span>正在刷新数据...</span>
                </div>
                <div class="table-card">
                    <table class="data-table">
                    <thead>
                        <tr>
                            <th>币种</th>
                            <th class="sortable" onclick="toggleApySort()" title="点击排序">
                                年化(APY)<span class="sort-icon" id="sort-icon">↓</span>
                            </th>
                            <th class="pc-only">结束时间</th>
                            <th class="pc-only">限额/锁仓</th>
                            <th class="pc-only">收益计算器</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
                </div>
            </div>
        </div>

    </div>

    <!-- 计算器弹窗 -->
    <div class="modal-overlay" id="calc-modal" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-title">
                <span>📊 收益计算器</span>
                <span class="modal-close" onclick="closeCalcModal()">×</span>
            </div>
            <div class="modal-info-row">
                <div class="modal-info-item">
                    <span>平台</span>
                    <span id="calc-platform">-</span>
                </div>
                <div class="modal-info-item">
                    <span>币种</span>
                    <span id="calc-coin">-</span>
                </div>
                <div class="modal-info-item">
                    <span>年化</span>
                    <span id="calc-apy">-</span>
                </div>
            </div>
            <input type="number" class="modal-input" id="calc-amount" placeholder="请输入投入金额" oninput="calculateProfit()">
            <div class="modal-result">
                <div class="modal-result-item">
                    <span>日收益</span>
                    <span class="modal-result-value" id="calc-day">0.00</span>
                </div>
                <div class="modal-result-item">
                    <span>月收益</span>
                    <span class="modal-result-value" id="calc-month">0.00</span>
                </div>
                <div class="modal-result-item">
                    <span>年收益</span>
                    <span class="modal-result-value" id="calc-year">0.00</span>
                </div>
            </div>
            <div class="modal-note">* 收益为预估值，实际收益以平台为准</div>
        </div>
    </div>

    <script>
        // 数据文件路径（由 GitHub Actions 自动更新）
        const DATA_URL = 'data.json';
        
        // 全局数据
        let allData = [];
        let maxApyValue = 0;
        let sortAscending = false; // 默认降序（从高到低）
        
        // 列名映射
        const COL = {
            PLATFORM: '平台',
            COIN: '币种',
            APY: '年化（APY）',
            LINK: '理财链接',
            TUTORIAL_LINK: '教程链接',
            START_TIME: '开始时间',
            END_TIME: '结束时间',
            PAY_TIME: '派息时间',
            LIMIT: '单个账户限额',
            IS_LOCKED: '是否锁仓'
        };

        // 刷新数据
        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            const overlay = document.getElementById('refresh-overlay');
            btn.classList.add('loading');
            if (overlay) overlay.classList.add('active');

            // 至少显示1秒加载动画
            const minDelay = new Promise(resolve => setTimeout(resolve, 1000));

            try {
                const [response] = await Promise.all([
                    fetch(DATA_URL + '?t=' + Date.now()),
                    minDelay
                ]);
                if (response.ok) {
                    const data = await response.json();
                    processAndRender(data);
                }
            } catch (e) {
                console.error('刷新失败:', e);
                await minDelay;
            } finally {
                btn.classList.remove('loading');
                if (overlay) overlay.classList.remove('active');
            }
        }

        // 解析 APY 数值
        function parseAPY(apyStr) {
            if (!apyStr) return 0;
            const num = parseFloat(apyStr.replace('%', ''));
            return isNaN(num) ? 0 : num;
        }
        
        // 解析结束时间
        function parseEndTime(endTimeStr) {
            if (!endTimeStr || ['暂无', '无截止', '-', '无', ''].includes(endTimeStr.trim())) {
                return null;
            }
            
            const match = endTimeStr.match(/(\d+)月(\d+)日(\d+)[点:]?(\d*)/);
            if (match) {
                const month = parseInt(match[1]);
                const day = parseInt(match[2]);
                const hour = parseInt(match[3]);
                const minute = match[4] ? parseInt(match[4]) : 0;
                
                const now = new Date();
                let year = now.getFullYear();
                if (month < now.getMonth() + 1) {
                    year++;
                }
                
                return new Date(year, month - 1, day, hour, minute);
            }
            return null;
        }

        // 格式化APY显示（括号内备注变小）
        function formatApy(apyStr) {
            if (!apyStr) return '';
            // 匹配括号内的内容，把它变小
            return apyStr.replace(/[（(]([^）)]+)[）)]/g, '<span class="apy-note">($1)</span>');
        }

        // 计算剩余时间和进度
        function calcRemaining(startTimeStr, endTimeStr) {
            const startDate = parseEndTime(startTimeStr);
            const endDate = parseEndTime(endTimeStr);
            
            // 如果没有结束时间，不显示进度
            if (!endDate) return { text: null, percent: null };
            
            const now = new Date();
            
            // 已结束
            if (endDate <= now) {
                return { text: '已结束', percent: 100 };
            }
            
            // 计算剩余时间文本
            const diff = endDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            let text;
            if (days > 0) {
                text = `剩余${days}天${hours}时`;
            } else {
                text = `剩余${hours}小时`;
            }
            
            // 计算进度百分比：(当前时间 - 开始时间) / (结束时间 - 开始时间)
            let progressPercent = 0;
            if (startDate && startDate < endDate) {
                const totalDuration = endDate - startDate;
                const elapsed = now - startDate;
                progressPercent = Math.max(0, Math.min(100, (elapsed / totalDuration) * 100));
            } else {
                // 如果没有开始时间，用剩余天数估算（假设活动30天）
                const totalDays = 30;
                progressPercent = Math.max(0, Math.min(100, (totalDays - days) / totalDays * 100));
            }

            return { text, percent: progressPercent };
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                
                const coin = row[COL.COIN] || '';
                const platform = row[COL.PLATFORM] || '';
                const apy = row[COL.APY] || '';
                const apyValue = parseAPY(apy);
                const tutorialLink = row[COL.TUTORIAL_LINK] || '';
                const startTime = row[COL.START_TIME] || '';
                const endTime = row[COL.END_TIME] || '';
                const limit = row[COL.LIMIT] || '';
                const isLocked = row[COL.IS_LOCKED] || '';
                const payTime = row[COL.PAY_TIME] || '';
                
                const { text: remainingText, percent: remainingPercent } = calcRemaining(startTime, endTime);
                
                // 构建标签 HTML
                let tagsHtml = '';
                if (limit && !['无', '-', ''].includes(limit)) {
                    tagsHtml += `<span class="tag tag-limit">${limit}</span>`;
                }
                if (isLocked && !['无', '-', ''].includes(isLocked)) {
                    tagsHtml += `<span class="tag tag-lock">${isLocked}</span>`;
                }
                if (payTime && !['无', '-', ''].includes(payTime)) {
                    tagsHtml += `<span class="tag tag-pay">${payTime}</span>`;
                }
                
                // 结束时间显示
                const endTimeDisplay = endTime && !['暂无', '无截止', '无', '-', ''].includes(endTime) ? endTime : '-';
                
                // 进度条 HTML
                let progressHtml = '';
                if (remainingText) {
                    progressHtml = `<div class="remaining-time">${remainingText}</div>`;
                    if (remainingPercent !== null) {
                        progressHtml += `<div class="progress-bar" style="margin: 6px auto 0;"><div class="progress-fill" style="width: ${remainingPercent}%"></div></div>`;
                    }
                }
                
                tr.innerHTML = `
                    <td class="coin-cell">
                        <div style="font-weight:bold;font-size:16px;">${coin}</div>
                        <div class="sub-text">${platform}</div>
                        <div class="mobile-tags">${tagsHtml}</div>
                    </td>
                    <td>
                        <div class="apy-cell">
                            <span class="highlight">${formatApy(apy)}</span>
                            ${progressHtml}
                            <div class="mobile-actions">
                                <span class="calc-btn" onclick="openCalcModal('${coin}', '${platform}', '${apy}')" title="计算收益"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="11" x2="8" y2="11"/><line x1="12" y1="11" x2="12" y2="11"/><line x1="16" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="8" y2="15"/><line x1="12" y1="15" x2="12" y2="15"/><line x1="16" y1="15" x2="16" y2="15"/><line x1="8" y1="19" x2="8" y2="19"/><line x1="12" y1="19" x2="12" y2="19"/><line x1="16" y1="19" x2="16" y2="19"/></svg></span>
                                <a href="${tutorialLink || '#'}" target="_blank" class="go-btn">教程</a>
                            </div>
                        </div>
                    </td>
                    <td class="pc-only">${endTimeDisplay}</td>
                    <td class="pc-only">${tagsHtml || '-'}</td>
                    <td class="action-cell">
                        <div class="action-inner">
                            <span class="calc-btn" onclick="openCalcModal('${coin}', '${platform}', '${apy}')" title="计算收益"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="11" x2="8" y2="11"/><line x1="12" y1="11" x2="12" y2="11"/><line x1="16" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="8" y2="15"/><line x1="12" y1="15" x2="12" y2="15"/><line x1="16" y1="15" x2="16" y2="15"/><line x1="8" y1="19" x2="8" y2="19"/><line x1="12" y1="19" x2="12" y2="19"/><line x1="16" y1="19" x2="16" y2="19"/></svg></span>
                            <a href="${tutorialLink || '#'}" target="_blank" class="go-btn">教程</a>
                        </div>
                    </td>
                `;
                
                tbody.appendChild(tr);
            });
        }
        
        // 计算器相关
        let currentCalcCoin = 'USDT';
        let currentCalcApy = 0;
        
        function openCalcModal(coin, platform, apy) {
            document.getElementById('calc-platform').textContent = platform;
            document.getElementById('calc-coin').textContent = coin;
            document.getElementById('calc-apy').textContent = apy;
            document.getElementById('calc-amount').value = '';
            document.getElementById('calc-day').textContent = '0.00';
            document.getElementById('calc-month').textContent = '0.00';
            document.getElementById('calc-year').textContent = '0.00';
            
            currentCalcCoin = coin;
            currentCalcApy = parseAPY(apy);
            
            document.getElementById('calc-modal').classList.add('active');
        }
        
        function closeCalcModal() {
            document.getElementById('calc-modal').classList.remove('active');
        }
        
        function closeModal(event) {
            if (event.target === document.getElementById('calc-modal')) {
                closeCalcModal();
            }
        }
        
        function calculateProfit() {
            const amount = parseFloat(document.getElementById('calc-amount').value) || 0;
            const yearProfit = amount * currentCalcApy / 100;
            const monthProfit = yearProfit / 12;
            const dayProfit = yearProfit / 365;

            // 去掉币种后面的括号说明
            const cleanCoin = currentCalcCoin.replace(/[（(].+[）)]/g, '');

            document.getElementById('calc-day').textContent = dayProfit.toFixed(2) + ' ' + cleanCoin;
            document.getElementById('calc-month').textContent = monthProfit.toFixed(2) + ' ' + cleanCoin;
            document.getElementById('calc-year').textContent = yearProfit.toFixed(2) + ' ' + cleanCoin;
        }
        
        // 处理数据并渲染
        function processAndRender(data) {
            allData = data;

            // 找最高 APY
            maxApyValue = 0;
            allData.forEach(row => {
                const apyValue = parseAPY(row[COL.APY]);
                if (apyValue > maxApyValue) {
                    maxApyValue = apyValue;
                }
            });

            // 默认按收益率从高到低排序
            const sortedData = sortDataByApy(allData, sortAscending);
            renderTable(sortedData);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        // 按APY排序数据
        function sortDataByApy(data, ascending) {
            return [...data].sort((a, b) => {
                const apyA = parseAPY(a[COL.APY]);
                const apyB = parseAPY(b[COL.APY]);
                return ascending ? apyA - apyB : apyB - apyA;
            });
        }

        // 切换排序
        function toggleApySort() {
            sortAscending = !sortAscending;
            const sortIcon = document.getElementById('sort-icon');
            sortIcon.textContent = sortAscending ? '↑' : '↓';

            const sortedData = sortDataByApy(allData, sortAscending);
            renderTable(sortedData);
        }
        
        // 加载数据
        async function fetchData() {
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('加载失败');
                const data = await response.json();
                console.log('数据加载成功，共', data.length, '条');
                return data;
            } catch (error) {
                console.error('数据加载失败:', error);
                return null;
            }
        }

        // 初始化
        async function loadData() {
            const data = await fetchData();
            if (data && data.length > 0) {
                processAndRender(data);
            } else {
                // 显示静态兜底数据
                showFallbackData();
            }
        }

        // 静态兜底数据（API 挂掉时显示）
        function showFallbackData() {
            const fallbackData = [
                { '平台': 'MEXC', '币种': 'USDT', '年化': '8%', '理财链接': 'https://www.mexc.com', '教程链接': '' },
                { '平台': 'Bitget', '币种': 'USDC', '年化': '6%', '理财链接': 'https://www.bitget.com', '教程链接': '' },
                { '平台': 'OKX', '币种': 'USDT', '年化': '5%', '理财链接': 'https://www.okx.com', '教程链接': '' }
            ];
            processAndRender(fallbackData);
            // 显示提示
            const notice = document.createElement('div');
            notice.style.cssText = 'background:#fff3cd;color:#856404;padding:10px;text-align:center;font-size:12px;margin-bottom:10px;border-radius:6px;';
            notice.innerHTML = '⚠️ 数据加载失败，显示的是缓存数据，请稍后刷新获取最新信息';
            document.querySelector('.table-card').prepend(notice);
        }
        
        // 主题切换
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }

        // 初始化主题
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }

        // 启动
        loadData();
    </script>
